current_default_release: skill_core_only_bundle

profiles:
  skill_core_only_bundle:
    description: Public repository release that publishes only the reusable think-tank Skill core.
    includes:
      - README.md
      - LICENSE
      - CONTRIBUTING.md
      - CHANGELOG.md
      - checks/*.py
      - think-tank/**
    excludes:
      - AGENTS.md
      - CLAUDE.md
      - .think-tank/**
      - .codex/**
      - .claude/**
      - .playwright-cli/**
      - .learnings/**
      - outputs/**
      - '**/__pycache__/**'
      - '*.pyc'
      - '**/.DS_Store'
    notes:
      - Current default public release for the think-tank Skill repository.
      - leader-runtime now lives in the standalone sibling project `leader-runtime-project`.
