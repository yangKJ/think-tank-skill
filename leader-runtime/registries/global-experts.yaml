registry_id: think_tank_codex_global_registry
owner: think_tank_global_leader
scope: global
inherits_from: null
constraints:
  - Dispatch selection does not prove independent expert invocation.
  - Leader remains responsible for final acceptance and synthesis.
experts:
  - expert_id: evidence_collector
    label: Evidence Collector
    owner_layer: global
    mapped_roles:
      - collector
    specialties:
      - evidence gathering
      - source reliability
      - context collection
    supported_modes:
      - research
      - review
    preferred_intents:
      - general_research
      - competitive_intelligence
      - technical_research
      - review_acceptance
    capability_affinity:
      - source-acquisition
      - knowledge-persistence
    dispatch_style: worker_prompt
    authority_scope: analysis
    availability_status: verified_partial
    project_tags: []
    boundaries:
      - Independent expert dispatch is still runtime-dependent on Codex subagent support.

  - expert_id: domain_analyst
    label: Domain Analyst
    owner_layer: global
    mapped_roles:
      - domain_expert
    specialties:
      - market interpretation
      - technical implications
      - domain judgment
    supported_modes:
      - research
      - council
      - strategy
    preferred_intents:
      - market_research
      - competitive_intelligence
      - technical_research
      - strategy_planning
    capability_affinity:
      - source-acquisition
      - social-listening
    dispatch_style: worker_prompt
    authority_scope: analysis
    availability_status: specified
    project_tags: []
    boundaries:
      - Requires leader synthesis before any final decision can be issued.

  - expert_id: risk_skeptic
    label: Risk Skeptic
    owner_layer: global
    mapped_roles:
      - skeptic
    specialties:
      - risk challenge
      - boundary review
      - anti-overclaim
    supported_modes:
      - research
      - council
      - review
      - strategy
    preferred_intents:
      - review_acceptance
      - decision_council
      - strategy_planning
    capability_affinity: []
    dispatch_style: worker_prompt
    authority_scope: review
    availability_status: verified_partial
    project_tags: []
    boundaries:
      - Should preserve disagreement instead of forcing consensus.

  - expert_id: execution_builder
    label: Execution Builder
    owner_layer: global
    mapped_roles:
      - builder
    specialties:
      - implementation planning
      - execution sequencing
      - delivery risk
    supported_modes:
      - council
      - review
      - strategy
    preferred_intents:
      - review_acceptance
      - strategy_planning
      - research_to_video
    capability_affinity:
      - media-production
      - knowledge-persistence
    dispatch_style: worker_prompt
    authority_scope: execution
    availability_status: specified
    project_tags: []
    boundaries:
      - Provides executable next steps, not final approval.

  - expert_id: report_synthesizer
    label: Report Synthesizer
    owner_layer: global
    mapped_roles:
      - synthesizer
    specialties:
      - consensus summary
      - disagreement preservation
      - decision-ready output
    supported_modes:
      - research
      - council
      - review
      - strategy
    preferred_intents:
      - synthesis
      - review_acceptance
      - decision_council
    capability_affinity: []
    dispatch_style: fallback_only
    authority_scope: mixed
    availability_status: verified_partial
    project_tags: []
    boundaries:
      - Leader owns final synthesis even when synthesizer is selected as expert.

  - expert_id: strategy_lead
    label: Strategy Lead
    owner_layer: global
    mapped_roles:
      - domain_expert
      - builder
    specialties:
      - product strategy
      - priority tradeoffs
      - go-forward framing
    supported_modes:
      - council
      - strategy
    preferred_intents:
      - strategy_planning
      - decision_council
      - competitive_intelligence
    capability_affinity:
      - source-acquisition
    dispatch_style: worker_prompt
    authority_scope: strategy
    availability_status: specified
    project_tags: []
    boundaries:
      - Should not overwrite raw evidence with pure strategic preference.
