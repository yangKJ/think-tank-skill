name: Bug report
description: Report a reproducible problem in the public Skill core
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands, files, and expected vs actual behavior.
    validations:
      required: true
  - type: textarea
    id: boundary
    attributes:
      label: Boundary
      description: Does this involve providers, private workspace data, or external tools?
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation output
      description: Paste relevant output from checks.
