<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">Validation tiers</title>
  <desc id="desc">Release, core, and local provider validation tiers.</desc>
  <rect width="1100" height="520" fill="#fbfdff"/>
  <g font-family="Inter, Arial, sans-serif">
    <text x="60" y="72" font-size="38" font-weight="800" fill="#102a43">Validation Tiers</text>
    <g font-size="20" font-weight="700">
      <rect x="70" y="130" width="285" height="250" rx="24" fill="#dff7ed" stroke="#9ae6b4"/>
      <text x="112" y="178" fill="#14532d">Tier 1</text>
      <text x="112" y="214" fill="#14532d">release gate</text>
      <text x="112" y="270" font-size="16" fill="#486581">Public and reproducible</text>
      <text x="112" y="302" font-size="16" fill="#486581">protocol, privacy, package</text>
      <text x="112" y="334" font-size="16" fill="#486581">open_source_release_suite</text>
      <rect x="407" y="130" width="285" height="250" rx="24" fill="#e7f0ff" stroke="#bcd4ff"/>
      <text x="449" y="178" fill="#163b73">Tier 2</text>
      <text x="449" y="214" fill="#163b73">core validation</text>
      <text x="449" y="270" font-size="16" fill="#486581">Maintainer checks</text>
      <text x="449" y="302" font-size="16" fill="#486581">runtime, schema, routing</text>
      <text x="449" y="334" font-size="16" fill="#486581">no private provider required</text>
      <rect x="744" y="130" width="285" height="250" rx="24" fill="#fff7ed" stroke="#fed7aa"/>
      <text x="786" y="178" fill="#9a3412">Tier 3</text>
      <text x="786" y="214" fill="#9a3412">local provider</text>
      <text x="786" y="270" font-size="16" fill="#486581">Project-instance checks</text>
      <text x="786" y="302" font-size="16" fill="#486581">login, vault, local services</text>
      <text x="786" y="334" font-size="16" fill="#486581">not a default claim</text>
    </g>
    <text x="70" y="448" font-size="18" fill="#486581">Report the tier with provider_invoked, result_recovered, and verification_status.</text>
  </g>
</svg>
