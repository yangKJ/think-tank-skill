<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 520" role="img" aria-labelledby="title desc">
  <title id="title">Capability boundary map</title>
  <desc id="desc">Included by default, optional with evidence, and not claimed.</desc>
  <rect width="1180" height="520" fill="#fbfdff"/>
  <g font-family="Inter, Arial, sans-serif">
    <text x="60" y="70" font-size="38" font-weight="800" fill="#102a43">Capability Boundaries</text>
    <g font-size="19" font-weight="700">
      <rect x="70" y="120" width="320" height="300" rx="24" fill="#dff7ed" stroke="#9ae6b4"/>
      <text x="112" y="170" fill="#14532d">Included by default</text>
      <text x="112" y="225" font-size="16" fill="#486581">protocol execution</text>
      <text x="112" y="258" font-size="16" fill="#486581">mode selection</text>
      <text x="112" y="291" font-size="16" fill="#486581">role organization</text>
      <text x="112" y="324" font-size="16" fill="#486581">structured output</text>
      <text x="112" y="357" font-size="16" fill="#486581">boundary declaration</text>
      <rect x="430" y="120" width="320" height="300" rx="24" fill="#e7f0ff" stroke="#bcd4ff"/>
      <text x="472" y="170" fill="#163b73">Optional with evidence</text>
      <text x="472" y="225" font-size="16" fill="#486581">web source reading</text>
      <text x="472" y="258" font-size="16" fill="#486581">browser snapshots</text>
      <text x="472" y="291" font-size="16" fill="#486581">media workflows</text>
      <text x="472" y="324" font-size="16" fill="#486581">knowledge persistence</text>
      <text x="472" y="357" font-size="16" fill="#486581">social listening</text>
      <rect x="790" y="120" width="320" height="300" rx="24" fill="#fff7ed" stroke="#fed7aa"/>
      <text x="832" y="170" fill="#9a3412">Not claimed</text>
      <text x="832" y="225" font-size="16" fill="#486581">all providers by default</text>
      <text x="832" y="258" font-size="16" fill="#486581">login automation</text>
      <text x="832" y="291" font-size="16" fill="#486581">private writes by default</text>
      <text x="832" y="324" font-size="16" fill="#486581">social scraping by default</text>
      <text x="832" y="357" font-size="16" fill="#486581">full cross-platform parity</text>
    </g>
  </g>
</svg>
