platform: claude
status: github_distribution_ready
partner_directory_status: no_public_self_serve_submission_flow_documented
package_modes:
  - agent_skills_core
display_name: think-tank
short_description: >
  Boundary-aware research, review, council, and strategy skill with explicit
  evidence states, protocol-first execution, and provider declaration rules.
install_sources:
  repository: https://github.com/yangKJ/think-tank-skill
  skill_core_artifact: dist/claude-code-skill/think-tank
recommended_locations:
  skill_user: ~/.claude/skills/think-tank/
  skill_project: .claude/skills/think-tank/
starter_prompts:
  - Use think-tank to review this plan and separate verified facts from assumptions.
  - Use think-tank to run a strategy comparison with explicit evidence states.
  - Use think-tank to organize these notes into a council-style recommendation.
known_constraints:
  - Claude Code skill installation should target the .claude/skills directory.
  - Anthropic mentions a skills ecosystem and partner directory, but a public self-serve listing flow was not documented in the sources used for this release.
