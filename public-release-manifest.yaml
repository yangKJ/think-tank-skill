release_manifest_version: 1
current_default_release: skill_core_only_bundle

profiles:
  skill_core_only_bundle:
    description: Public repository release that publishes only the reusable think-tank Skill core.
    public_includes:
      - repository_readme
      - license
      - contribution_guide
      - changelog
      - release_checks
      - community_health_files
      - skill_core
      - protocol_docs
      - schemas
      - templates
      - public_examples
      - eval_fixtures
      - public_visual_assets
      - docs_site_structure
      - skill_experience_docs
      - skill_self_tests
      - platform_distribution_docs
      - marketplace_listing_metadata
      - packaging_script
    public_excludes:
      - local_agent_instructions
      - local_runtime_state
      - private_research_workspace
      - generated_outputs
      - local_cache_files
      - secrets_or_credentials
      - closed_source_runtime_projects
      - machine_specific_files
      - user_owned_yaml_policy
    notes:
      - The public release is intentionally skill-core-only.
      - Runtime products, private workspaces, credentials, generated outputs, and machine-local state are outside the public release.
